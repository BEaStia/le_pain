environments:
  development:
    default: true
  staging:
  production:
  docker:

logger:
  level: debug
  format: text
  output: stdout
  transport_levels:
    http: info
    mq: debug
  request:
    enabled: true
    log_body: false
    log_headers: false
    sensitive_fields:
      - authorization
      - password
      - password_hash
      - token
      - api_key
      - secret

context:
  request_id_header: x-request-id
  trace_id_header: x-trace-id
  correlation_id_header: x-correlation-id

auth:
  headers: [X-Api-Key, Authorization]

idempotency:
  enabled: true
  ttl: 3600
  key_header: idempotency-key

http:
  host: 0.0.0.0
  port: 3000
  tls:
    enabled: false
    cert:
    key:
    min_version: TLS1_2

http_client:
  adapter: net_http
  default_timeout: 5
  max_retries: 2
  follow_redirects: true
  services:
    order-service:
      base_url: http://order-service:3000
      timeout: 10
      retries: 3
      adapter: net_http

compression:
  enabled: true
  algorithms: [gzip, br]
  min_size: 1024
  content_types:
    - application/json
    - text/plain
    - application/xml

cache:
  store: memory
  default_ttl: 300
  max_size: 1000
  namespace: le_pain
  version: v1

openapi:
  enabled: true
  info:
    title: LePain API
    version: 1.0.0
    description: API documentation
  docs:
    swagger_ui: true
    redoc: true
  validation:
    requests: true
    responses: false
  warn_undocumented: true

task_store:
  type: memory
  options:
    ttl: 86400

async:
  pool_size: 5
  timeout: 300
  retry:
    max_attempts: 3
    strategy: exponential
    backoff_base: 2
    max_delay: 300
    jitter: true
  dead_letter:
    enabled: true
    type: memory
    ttl: 604800

metrics:
  enabled: true
  port: 3002
  auth_token:

circuit_breakers:
  redis:
    failure_threshold: 5
    success_threshold: 2
    timeout: 30
  kafka:
    failure_threshold: 10
    success_threshold: 2
    timeout: 60

security:
  enabled: true
  headers:
    x_frame_options: DENY
    x_content_type_options: nosniff
    x_xss_protection: "1; mode=block"
    strict_transport_security: "max-age=31536000; includeSubDomains"
    csp: "default-src 'self'"
    referrer_policy: strict-origin-when-cross-origin
  payload:
    max_size: 1048576
    allowed_types:
      - application/json
  sanitizer:
    strip_null_bytes: true
    max_string_length: 10000
    reject_sql_patterns: true
    reject_path_traversal: true
    escape_html: true
  tls:
    enabled: false
    cert:
    key:
    min_version: TLS1_2
  audit:
    log_payload: false
    sensitive_fields:
      - password
      - token
      - secret
      - api_key

health_check:
  enabled: true
  port: 3001

shutdown:
  timeout: 30

error_handling:
  include_backtrace: false
